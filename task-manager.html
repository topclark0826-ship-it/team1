<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チームタスク管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f5f7;--surface:#fff;--surface2:#f8f9fb;--border:#e4e7ed;
    --accent:#5b6af0;--accent-light:#eef0fd;
    --text:#1a1d2e;--text-muted:#8b90a7;
    --green:#22c07a;--green-light:#eafaf2;
    --yellow:#f5a623;--yellow-light:#fef8ec;
    --red:#f04f5b;--red-light:#fef0f1;
    --purple:#8b5cf6;--purple-light:#f3effe;
    --shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2.5rem 2rem;}
  header{max-width:820px;margin:0 auto 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
  .header-left h1{font-family:'DM Mono',monospace;font-size:1.2rem;}
  .header-left p{font-size:0.78rem;color:var(--text-muted);margin-top:0.2rem;}
  .header-actions{display:flex;gap:0.7rem;}
  .btn-template{background:var(--purple-light);color:var(--purple);border:1px solid #d4bffc;padding:0.52rem 1.1rem;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:0.83rem;cursor:pointer;}
  .btn-template:hover{background:#ece5fd;}
  .add-btn{background:var(--accent);color:white;border:none;padding:0.55rem 1.2rem;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:0.85rem;cursor:pointer;}
  .add-btn:hover{opacity:0.88;}
  .loading-bar{position:fixed;top:0;left:0;width:100%;height:3px;background:var(--accent);z-index:9999;display:none;}
  .loading-bar.show{display:block;animation:la 1.2s ease-in-out infinite;}
  @keyframes la{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(0.7);transform-origin:left}100%{transform:scaleX(1);transform-origin:left;opacity:0}}
  .template-panel{max-width:820px;margin:0 auto 1.6rem;background:white;border:1px solid #d4bffc;border-radius:12px;overflow:hidden;box-shadow:var(--shadow);display:none;}
  .template-panel.show{display:block;}
  .template-panel-header{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.2rem;background:var(--purple-light);border-bottom:1px solid #d4bffc;}
  .template-panel-header h2{font-size:0.88rem;color:var(--purple);font-weight:700;}
  .template-panel-close{background:transparent;border:none;color:var(--purple);cursor:pointer;font-size:1rem;}
  .template-item{display:flex;align-items:center;gap:1rem;padding:0.85rem 1.2rem;border-bottom:1px solid #ede8fc;transition:background 0.15s;}
  .template-item:last-child{border-bottom:none;}
  .template-item:hover{background:#faf8ff;}
  .tmpl-icon{width:34px;height:34px;border-radius:8px;background:var(--purple-light);border:1px solid #d4bffc;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
  .tmpl-info{flex:1;min-width:0;}
  .tmpl-name{font-size:0.88rem;font-weight:500;}
  .tmpl-meta{font-size:0.74rem;color:var(--text-muted);margin-top:0.15rem;}
  .tmpl-date-row{display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem;}
  .tmpl-date-label{font-size:0.72rem;color:var(--text-muted);white-space:nowrap;}
  .tmpl-date-input{background:white;border:1px solid var(--border);color:var(--text);padding:0.25rem 0.55rem;border-radius:6px;font-size:0.75rem;font-family:'Noto Sans JP',sans-serif;outline:none;}
  .tmpl-actions{display:flex;gap:0.4rem;flex-shrink:0;}
  .tmpl-btn{border-radius:6px;padding:0.28rem 0.8rem;font-size:0.75rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
  .tmpl-copy-btn{background:var(--accent);color:white;border:none;}
  .tmpl-copy-btn:hover{opacity:0.85;}
  .tmpl-del-btn{background:transparent;color:var(--text-muted);border:1px solid var(--border);}
  .tmpl-del-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}
  .tmpl-empty{padding:2rem;text-align:center;color:var(--text-muted);font-size:0.84rem;}
  .tmpl-empty small{display:block;margin-top:0.3rem;font-size:0.74rem;opacity:0.7;}
  .main-layout{max-width:820px;margin:0 auto;display:flex;flex-direction:column;gap:0.7rem;}
  .parent-task{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow 0.2s;}
  .parent-task:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.06);}
  .parent-task.completed{opacity:0.55;border-left:3px solid var(--green);}
  .parent-header{display:flex;align-items:center;gap:0.9rem;padding:1rem 1.2rem;cursor:pointer;user-select:none;}
  .toggle-icon{color:var(--text-muted);font-size:0.62rem;width:14px;flex-shrink:0;transition:transform 0.2s;}
  .open .toggle-icon{transform:rotate(90deg);}
  .task-name{flex:1;font-size:0.95rem;font-weight:500;}
  .completed .task-name{text-decoration:line-through;color:var(--text-muted);}
  .completed-badge{display:none;background:var(--green-light);color:var(--green);font-size:0.68rem;padding:0.18rem 0.55rem;border-radius:20px;font-weight:500;}
  .completed .completed-badge{display:inline-block;}
  .task-meta{display:flex;align-items:center;gap:0.7rem;font-size:0.73rem;color:var(--text-muted);}
  .due-overdue{color:var(--red)!important;font-weight:700;}
  .count-badge{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-size:0.68rem;padding:0.12rem 0.45rem;border-radius:10px;font-family:'DM Mono',monospace;}
  .progress-wrap{display:flex;align-items:center;gap:0.45rem;}
  .progress-bar{width:64px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#8b6af0);border-radius:2px;transition:width 0.4s;}
  .completed .progress-fill{background:var(--green);}
  .task-actions{display:flex;align-items:center;gap:0.35rem;opacity:0;transition:opacity 0.2s;}
  .parent-task:hover .task-actions{opacity:1;}
  .action-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:0.22rem 0.55rem;font-size:0.7rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--text-muted);transition:all 0.15s;white-space:nowrap;}
  .action-btn.complete-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-light);}
  .action-btn.delete-btn:hover{border-color:var(--red);color:var(--red);background:var(--red-light);}
  .action-btn.reopen-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .action-btn.save-tmpl-btn:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-light);}
  .detail-panel{display:none;padding:0 1.2rem 1.2rem;border-top:1px solid var(--border);}
  .open .detail-panel{display:block;}
  .detail-edit-row{display:flex;gap:1rem;margin:0.85rem 0;flex-wrap:wrap;}
  .detail-edit-field{display:flex;flex-direction:column;gap:0.3rem;flex:1;min-width:160px;}
  .detail-edit-label{font-size:0.68rem;color:var(--text-muted);font-weight:500;letter-spacing:0.05em;text-transform:uppercase;}
  .detail-edit-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.5rem 0.75rem;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
  .detail-edit-input:focus{border-color:var(--accent);background:white;}
  .detail-desc{font-size:0.84rem;color:var(--text-muted);padding:0.85rem 0;line-height:1.75;border-bottom:1px solid var(--border);margin-bottom:0.85rem;}
  .sub-list-header{font-size:0.68rem;color:var(--text-muted);font-family:'DM Mono',monospace;margin-bottom:0.5rem;letter-spacing:0.08em;}
  .sub-list{display:flex;flex-direction:column;gap:0.4rem;}
  .sub-task{display:flex;align-items:center;gap:0.8rem;padding:0.6rem 0.85rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;transition:background 0.15s;}
  .sub-task:hover{background:#f0f2f8;}
  .member-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#8b6af0);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:white;flex-shrink:0;}
  .member-name{flex:1;font-weight:500;font-size:0.85rem;}
  .status-select{background:white;border:1px solid var(--border);color:var(--text);padding:0.26rem 0.5rem;border-radius:6px;font-size:0.74rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;outline:none;}
  .status-select:focus{border-color:var(--accent);}
  .status-badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.68rem;font-weight:500;min-width:50px;text-align:center;}
  .status-todo{background:#f0f1f5;color:var(--text-muted);}
  .status-wip{background:var(--yellow-light);color:var(--yellow);}
  .status-done{background:var(--green-light);color:var(--green);}
  .status-hold{background:var(--red-light);color:var(--red);}
  .member-del-btn{background:transparent;border:none;color:var(--border);cursor:pointer;font-size:0.9rem;padding:0.1rem 0.2rem;border-radius:4px;transition:color 0.15s;flex-shrink:0;}
  .sub-task:hover .member-del-btn{color:var(--text-muted);}
  .member-del-btn:hover{color:var(--red)!important;}
  .add-member-btn{background:transparent;border:1px dashed var(--border);color:var(--text-muted);padding:0.5rem;border-radius:8px;font-size:0.78rem;cursor:pointer;width:100%;margin-top:0.55rem;font-family:'Noto Sans JP',sans-serif;}
  .add-member-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .section-label{font-size:0.72rem;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:0.07em;display:flex;align-items:center;gap:0.6rem;margin-top:0.3rem;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(20,20,40,0.28);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:white;border:1px solid var(--border);border-radius:16px;padding:2rem;width:480px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,0.14);animation:mi 0.18s ease;}
  @keyframes mi{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal h2{font-size:1rem;margin-bottom:1.4rem;font-weight:700;}
  .form-group{margin-bottom:1rem;}
  .form-group label{display:block;font-size:0.77rem;color:var(--text-muted);margin-bottom:0.35rem;font-weight:500;}
  .form-group input,.form-group textarea,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.6rem 0.8rem;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--accent);background:white;}
  .form-group textarea{height:72px;resize:vertical;}
  .tmpl-member-list{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:0.5rem;}
  .tmpl-member-row{display:flex;gap:0.5rem;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.42rem 0.7rem;font-size:0.82rem;}
  .tmpl-member-row .m-name{flex:1;font-weight:500;}
  .tmpl-member-row .m-remove{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:0.85rem;padding:0 0.2rem;}
  .tmpl-member-row .m-remove:hover{color:var(--red);}
  .add-tmpl-member-row{display:flex;gap:0.5rem;align-items:center;}
  .add-tmpl-member-row input{flex:1;padding:0.45rem 0.7rem;font-size:0.82rem;}
  .add-tmpl-member-row button{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);border-radius:7px;padding:0.45rem 0.8rem;font-size:0.78rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
  .add-tmpl-member-row button:hover{border-color:var(--accent);color:var(--accent);}
  .modal-actions{display:flex;gap:0.7rem;justify-content:flex-end;margin-top:1.5rem;}
  .btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:0.58rem 1.2rem;border-radius:8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:0.85rem;}
  .btn-cancel:hover{background:var(--surface2);}
  .btn-save{background:var(--accent);border:none;color:white;padding:0.58rem 1.4rem;border-radius:8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:0.85rem;}
  .btn-save:hover{opacity:0.88;}
  .btn-save:disabled{opacity:0.4;pointer-events:none;}
  .btn-save-purple{background:var(--purple);border:none;color:white;padding:0.58rem 1.4rem;border-radius:8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:0.85rem;}
  .btn-save-purple:hover{opacity:0.88;}
  .btn-save-purple:disabled{opacity:0.4;pointer-events:none;}
  .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(20,20,40,0.3);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;}
  .confirm-overlay.show{display:flex;}
  .confirm-box{background:white;border-radius:14px;padding:1.8rem;width:360px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.15);animation:mi 0.15s ease;}
  .confirm-box h3{font-size:0.95rem;margin-bottom:0.6rem;}
  .confirm-box p{font-size:0.82rem;color:var(--text-muted);line-height:1.65;}
  .confirm-actions{display:flex;gap:0.6rem;justify-content:flex-end;margin-top:1.4rem;}
  .btn-danger{background:var(--red);border:none;color:white;padding:0.55rem 1.2rem;border-radius:8px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:0.85rem;}
  .err-bar{max-width:820px;margin:0 auto 1rem;background:var(--red-light);border:1px solid #f5c6c4;border-left:3px solid var(--red);border-radius:8px;padding:0.6rem 1rem;font-size:0.8rem;color:var(--red);display:none;}
  .err-bar.show{display:block;}
  .empty-state{text-align:center;padding:4rem 2rem;color:var(--text-muted);font-size:0.88rem;max-width:820px;margin:0 auto;}
  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1d2e;color:white;padding:0.65rem 1.4rem;border-radius:100px;font-size:0.82rem;opacity:0;transition:all 0.25s;z-index:999;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="loading-bar" id="loadingBar"></div>
<header>
  <div class="header-left"><h1>Task Board</h1><p>チームのタスクをまとめて管理</p></div>
  <div class="header-actions">
    <button class="btn-template" onclick="toggleTemplatePanel()">&#128203; テンプレート</button>
    <button class="add-btn" onclick="openTaskModal()">&#65291; タスク追加</button>
  </div>
</header>
<div class="err-bar" id="errBar"></div>
<div class="template-panel" id="templatePanel">
  <div class="template-panel-header">
    <h2>&#128203; テンプレート一覧</h2>
    <button class="template-panel-close" onclick="toggleTemplatePanel()">&#10005;</button>
  </div>
  <div id="templateList"></div>
</div>
<div class="main-layout" id="root"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2>&#128203; タスクを追加</h2>
    <div class="form-group"><label>タスク名 *</label><input type="text" id="taskNameInput" placeholder="例）ウェブサイトリニューアル"></div>
    <div class="form-group"><label>詳細・説明</label><textarea id="taskDescInput" placeholder="タスクの背景や目標を記入..."></textarea></div>
    <div class="form-group"><label>期限</label><input type="date" id="taskDueInput"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('taskModal')">キャンセル</button>
      <button class="btn-save" id="taskSaveBtn" onclick="saveTask()">追加する</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="memberModal">
  <div class="modal">
    <h2>&#128100; 担当者を追加</h2>
    <div class="form-group"><label>氏名 *</label><input type="text" id="memberNameInput" placeholder="例）中村"></div>
    <div class="form-group"><label>初期ステータス</label>
      <select id="memberStatusInput">
        <option value="todo">未着手</option><option value="wip">進行中</option>
        <option value="done">完了</option><option value="hold">保留</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('memberModal')">キャンセル</button>
      <button class="btn-save" id="memberSaveBtn" onclick="saveMember()">追加する</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="saveTmplModal">
  <div class="modal">
    <h2>&#128203; テンプレートとして保存</h2>
    <div class="form-group"><label>テンプレート名 *</label><input type="text" id="tmplNameInput" placeholder="例）定期レポート作成"></div>
    <div class="form-group"><label>説明（任意）</label><input type="text" id="tmplDescInput" placeholder="例）毎月の報告業務"></div>
    <div class="form-group">
      <label>担当者</label>
      <div class="tmpl-member-list" id="tmplMemberList"></div>
      <div class="add-tmpl-member-row">
        <input type="text" id="tmplMemberName" placeholder="氏名を追加">
        <button onclick="addTmplMember()">&#65291; 追加</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('saveTmplModal')">キャンセル</button>
      <button class="btn-save-purple" id="tmplSaveBtn" onclick="saveTemplate()">保存する</button>
    </div>
  </div>
</div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3 id="confirmTitle">削除しますか？</h3>
    <p id="confirmMsg"></p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="btn-danger" onclick="runConfirmAction()">削除する</button>
    </div>
  </div>
</div>
<script>
var GAS='https://script.google.com/macros/s/AKfycbxr_m8bQScgxBxiONtASYfo6W68Zwj0baEyb1-0zy-2Gdt6t2NOOme5gpskGKHyRE1B_A/exec';
var tasks=[],templates=[],openTasks={},currentParentId=null,pendingConfirmFn=null,tmplDraftMembers=[];
var SL={todo:'未着手',wip:'進行中',done:'完了',hold:'保留'};
var SC={todo:'status-todo',wip:'status-wip',done:'status-done',hold:'status-hold'};
function setLoading(on){document.getElementById('loadingBar').classList.toggle('show',on);}
function showErr(msg){var el=document.getElementById('errBar');el.textContent='&#9888; '+msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},6000);}
function gasRequest(params){
  return new Promise(function(resolve,reject){
    var cbName='cb_'+Math.random().toString(36).slice(2);
    var qs='';var keys=Object.keys(params);
    for(var i=0;i<keys.length;i++){if(qs)qs+='&';qs+=encodeURIComponent(keys[i])+'='+encodeURIComponent(params[keys[i]]);}
    qs+='&callback='+encodeURIComponent(cbName);
    var script=document.createElement('script');
    var timer=setTimeout(function(){cleanup();reject(new Error('タイムアウト'));},15000);
    function cleanup(){clearTimeout(timer);delete window[cbName];if(script.parentNode)script.parentNode.removeChild(script);}
    window[cbName]=function(data){cleanup();if(data.ok)resolve(data);else reject(new Error(data.error||'エラー'));};
    script.src=GAS+'?'+qs;
    script.onerror=function(){cleanup();reject(new Error('通信エラー'));};
    document.head.appendChild(script);
  });
}
function apiGet(action){setLoading(true);return gasRequest({action:action}).catch(function(e){showErr('取得失敗: '+e.message);throw e;}).finally(function(){setLoading(false);});}
function apiSend(action,data){setLoading(true);return gasRequest({action:action,data:JSON.stringify(data)}).catch(function(e){showErr('操作失敗: '+e.message);throw e;}).finally(function(){setLoading(false);});}
function boot(){Promise.all([apiGet('getTasks'),apiGet('getTemplates')]).then(function(r){tasks=r[0].tasks||[];templates=r[1].templates||[];render();}).catch(function(){});}
function calcProgress(members){if(!members.length)return 0;return Math.round(members.filter(function(m){return m.status==='done';}).length/members.length*100);}
function formatDue(due){
  if(!due)return '';
  // already yyyy-MM-dd
  if(/^\d{4}-\d{2}-\d{2}$/.test(due))return due;
  var d=new Date(due);if(isNaN(d))return due;
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function isOverdue(due){
  if(!due)return false;
  var fmt=formatDue(due);
  var today=new Date();today.setHours(0,0,0,0);
  var d=new Date(fmt);
  return d<today;
}
function render(){
  var root=document.getElementById('root');root.innerHTML='';
  var active=tasks.filter(function(t){return !t.completed;});
  var done=tasks.filter(function(t){return t.completed;});
  if(!tasks.length){root.innerHTML='<div class="empty-state">タスクがありません。追加してください。</div>';renderTemplateList();return;}
  active.sort(function(a,b){
    if(!a.due&&!b.due)return 0;
    if(!a.due)return 1;
    if(!b.due)return -1;
    return formatDue(a.due)<formatDue(b.due)?-1:1;
  });
  active.forEach(function(t){root.appendChild(buildTaskEl(t));});
  if(done.length){var lbl=document.createElement('div');lbl.className='section-label';lbl.textContent='完了済み ('+done.length+')';root.appendChild(lbl);done.forEach(function(t){root.appendChild(buildTaskEl(t));});}
  renderTemplateList();
}
function buildTaskEl(task){
  var p=calcProgress(task.members);var isOpen=!!openTasks[task.id];
  var dueFmt=formatDue(task.due);
  var el=document.createElement('div');
  el.className='parent-task'+(task.completed?' completed':'')+(isOpen?' open':'');
  el.id='task-'+task.id;
  var completeBtn=task.completed
    ?'<button class="action-btn reopen-btn" onclick="event.stopPropagation();toggleComplete(\'' +task.id+ '\',false)">&#8617; 再開</button>'
    :'<button class="action-btn complete-btn" onclick="event.stopPropagation();toggleComplete(\'' +task.id+ '\',true)">&#10003; 完了にする</button>';
  el.innerHTML=
    '<div class="parent-header" onclick="toggleTask(\'' +task.id+ '\')">'
    +'<span class="toggle-icon">&#9658;</span>'
    +'<span class="task-name">'+esc(task.name)+'</span>'
    +'<span class="completed-badge">完了</span>'
    +'<div class="task-meta">'
      +'<span class="count-badge">'+task.members.length+'名</span>'
      +(dueFmt?'<span class="'+(isOverdue(task.due)?'due-overdue':'')+'">&#128197; '+dueFmt+'</span>':'')
      +'<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="pf-'+task.id+'" style="width:'+p+'%"></div></div><span id="pp-'+task.id+'">'+p+'%</span></div>'
    +'</div>'
    +'<div class="task-actions" onclick="event.stopPropagation()">'
      +'<button class="action-btn save-tmpl-btn" onclick="openSaveTmplModal(\'' +task.id+ '\')">&#128203; テンプレ保存</button>'
      +completeBtn
      +'<button class="action-btn delete-btn" onclick="askDeleteTask(\'' +task.id+ '\')">&#128465; 削除</button>'
    +'</div>'
    +'</div>'
    +'<div class="detail-panel">'
      +'<div class="detail-edit-row">'
        +'<div class="detail-edit-field">'
          +'<label class="detail-edit-label">タスク名</label>'
          +'<input class="detail-edit-input" id="tname-'+task.id+'" value="'+esc(task.name)+'" data-tid="'+task.id+'" onblur="saveTaskName(this)">'
        +'</div>'
        +'<div class="detail-edit-field" style="flex:0 0 200px">'
          +'<label class="detail-edit-label">期限</label>'
          +'<input type="date" class="detail-edit-input" id="tdue-'+task.id+'" value="'+esc(formatDue(task.due||''))+'" data-tid="'+task.id+'" onchange="saveTaskDue(this)">'
        +'</div>'
      +'</div>'
      +'<div class="detail-desc">'+esc(task.desc||'説明なし')+'</div>'
      +'<div class="sub-list-header">MEMBERS</div>'
      +'<div class="sub-list" id="sublist-'+task.id+'">'+task.members.map(function(m){return memberHtml(task.id,m);}).join('')+'</div>'
      +'<button class="add-member-btn" onclick="openMemberModal(\'' +task.id+ '\')">&#65291; 担当者を追加</button>'
    +'</div>';
  return el;
}
function memberHtml(tid,m){
  return '<div class="sub-task" id="member-'+m.id+'">'
    +'<div class="member-avatar">'+esc(m.name.charAt(0))+'</div>'
    +'<span class="member-name">'+esc(m.name)+'</span>'
    +'<select class="status-select" onchange="updateMemberStatus(\'' +tid+ '\',\'' +m.id+ '\',this.value)">'
      +'<option value="todo"'+(m.status==='todo'?' selected':'')+'>未着手</option>'
      +'<option value="wip"'+(m.status==='wip'?' selected':'')+'>進行中</option>'
      +'<option value="done"'+(m.status==='done'?' selected':'')+'>完了</option>'
      +'<option value="hold"'+(m.status==='hold'?' selected':'')+'>保留</option>'
    +'</select>'
    +'<span class="status-badge '+SC[m.status]+'" id="badge-'+m.id+'">'+SL[m.status]+'</span>'
    +'<button class="member-del-btn" onclick="askDeleteMember(\'' +tid+ '\',\'' +m.id+ '\',\'' +esc(m.name)+ '\')">&#10005;</button>'
    +'</div>';
}
function toggleTask(id){if(openTasks[id])delete openTasks[id];else openTasks[id]=true;var el=document.getElementById('task-'+id);if(el)el.classList.toggle('open');}
function toggleComplete(id,completed){apiSend('updateTaskStatus',{id:id,completed:completed}).then(function(){var t=tasks.find(function(t){return t.id===id;});if(t)t.completed=completed;render();}).catch(function(){});}
function saveTaskName(input){
  var id=input.dataset.tid;var name=input.value.trim();
  var task=tasks.find(function(t){return t.id===id;});
  if(!task)return;
  if(!name){input.value=task.name;return;}
  if(task.name===name)return;
  task.name=name;
  // update header display
  var header=document.querySelector('#task-'+id+' .task-name');if(header)header.textContent=name;
  apiSend('updateTask',{id:id,name:name}).then(function(){showToast('タスク名を更新しました');}).catch(function(){boot();});
}
function saveTaskDue(input){
  var id=input.dataset.tid;var due=input.value;
  var task=tasks.find(function(t){return t.id===id;});
  if(!task||task.due===due)return;
  task.due=due;
  apiSend('updateTask',{id:id,due:due}).then(function(){showToast('期限を更新しました');}).catch(function(){boot();});
}
function updateMemberStatus(tid,mid,ns){
  var badge=document.getElementById('badge-'+mid);if(badge){badge.className='status-badge '+SC[ns];badge.textContent=SL[ns];}
  var task=tasks.find(function(t){return t.id===tid;});var mbr=task&&task.members.find(function(m){return m.id===mid;});if(mbr)mbr.status=ns;
  updateProg(tid,task);
  apiSend('updateMemberStatus',{id:mid,status:ns}).catch(function(){boot();});
}
function updateProg(tid,task){if(!task)return;var p=calcProgress(task.members);var pf=document.getElementById('pf-'+tid);var pp=document.getElementById('pp-'+tid);if(pf)pf.style.width=p+'%';if(pp)pp.textContent=p+'%';}
function askDeleteTask(id){var t=tasks.find(function(t){return t.id===id;});if(!t)return;document.getElementById('confirmTitle').textContent='タスクを削除しますか？';document.getElementById('confirmMsg').textContent='「'+t.name+'」を削除します。この操作は元に戻せません。';pendingConfirmFn=function(){apiSend('deleteTask',{id:id}).then(function(){tasks=tasks.filter(function(t){return t.id!==id;});render();showToast('タスクを削除しました');}).catch(function(){});};document.getElementById('confirmOverlay').classList.add('show');}
function askDeleteMember(tid,mid,name){document.getElementById('confirmTitle').textContent='担当者を削除しますか？';document.getElementById('confirmMsg').textContent='「'+name+'」を削除します。';pendingConfirmFn=function(){apiSend('deleteMember',{id:mid}).then(function(){var task=tasks.find(function(t){return t.id===tid;});if(task)task.members=task.members.filter(function(m){return m.id!==mid;});var el=document.getElementById('member-'+mid);if(el)el.remove();var badge=document.querySelector('#task-'+tid+' .count-badge');if(badge&&task)badge.textContent=task.members.length+'名';updateProg(tid,task);showToast('担当者を削除しました');}).catch(function(){});};document.getElementById('confirmOverlay').classList.add('show');}
function openTaskModal(){document.getElementById('taskNameInput').value='';document.getElementById('taskDescInput').value='';document.getElementById('taskDueInput').value='';openModal('taskModal');setTimeout(function(){document.getElementById('taskNameInput').focus();},60);}
function saveTask(){
  var name=document.getElementById('taskNameInput').value.trim();if(!name){alert('タスク名を入力してください');return;}
  var btn=document.getElementById('taskSaveBtn');btn.disabled=true;
  var payload={name:name,desc:document.getElementById('taskDescInput').value.trim(),due:document.getElementById('taskDueInput').value};
  apiSend('saveTask',payload).then(function(res){tasks.unshift({id:res.id,name:payload.name,desc:payload.desc,due:payload.due,completed:false,members:[]});openTasks[res.id]=true;closeModal('taskModal');render();showToast('タスクを追加しました');}).catch(function(){}).finally(function(){btn.disabled=false;});
}
function openMemberModal(pid){currentParentId=pid;document.getElementById('memberNameInput').value='';document.getElementById('memberStatusInput').value='todo';openModal('memberModal');setTimeout(function(){document.getElementById('memberNameInput').focus();},60);}
function saveMember(){
  var name=document.getElementById('memberNameInput').value.trim();if(!name){alert('氏名を入力してください');return;}
  var status=document.getElementById('memberStatusInput').value;var btn=document.getElementById('memberSaveBtn');btn.disabled=true;
  apiSend('saveMember',{task_id:currentParentId,name:name,status:status}).then(function(res){var task=tasks.find(function(t){return t.id===currentParentId;});var m={id:res.id,name:name,status:status};if(task)task.members.push(m);var sl=document.getElementById('sublist-'+currentParentId);if(sl)sl.insertAdjacentHTML('beforeend',memberHtml(currentParentId,m));var badge=document.querySelector('#task-'+currentParentId+' .count-badge');if(badge&&task)badge.textContent=task.members.length+'名';updateProg(currentParentId,task);closeModal('memberModal');showToast('担当者を追加しました');}).catch(function(){}).finally(function(){btn.disabled=false;});
}
function toggleTemplatePanel(){var p=document.getElementById('templatePanel');p.classList.toggle('show');if(p.classList.contains('show'))renderTemplateList();}
function renderTemplateList(){
  var el=document.getElementById('templateList');if(!el)return;
  if(!templates.length){el.innerHTML='<div class="tmpl-empty">テンプレートがありません<small>タスク右上の「テンプレ保存」から登録できます</small></div>';return;}
  el.innerHTML=templates.map(function(t){
    return '<div class="template-item" id="tmpl-item-'+t.id+'">'
      +'<div class="tmpl-icon">'+(t.icon||'&#128203;')+'</div>'
      +'<div class="tmpl-info">'
        +'<div class="tmpl-name">'+esc(t.name)+'</div>'
        +'<div class="tmpl-meta">'+esc(t.desc||'')+(t.members.length?' · '+t.members.length+'名':'')+'</div>'
        +'<div class="tmpl-date-row"><span class="tmpl-date-label">&#128197; 期限：</span>'
        +'<input type="date" class="tmpl-date-input" id="td-'+t.id+'" value="'+esc(t.defaultDue||'')+'"></div>'
      +'</div>'
      +'<div class="tmpl-actions">'
        +'<button class="tmpl-btn tmpl-copy-btn" onclick="applyTemplate(\'' +t.id+ '\')">コピーして追加</button>'
        +'<button class="tmpl-btn tmpl-del-btn" onclick="askDeleteTemplate(\'' +t.id+ '\')">削除</button>'
      +'</div>'
      +'</div>';
  }).join('');
}
function applyTemplate(tmplId){
  var tmpl=templates.find(function(t){return t.id===tmplId;});if(!tmpl)return;
  var di=document.getElementById('td-'+tmplId);var due=di?di.value:'';if(due)tmpl.defaultDue=due;
  apiSend('saveTask',{name:tmpl.name,desc:tmpl.desc||'',due:due}).then(function(tr){
    var newTask={id:tr.id,name:tmpl.name,desc:tmpl.desc||'',due:due,completed:false,members:[]};
    var chain=Promise.resolve();
    tmpl.members.forEach(function(m){chain=chain.then(function(){return apiSend('saveMember',{task_id:tr.id,name:m.name,status:'todo'}).then(function(mr){newTask.members.push({id:mr.id,name:m.name,status:'todo'});});});});
    return chain.then(function(){return newTask;});
  }).then(function(newTask){tasks.unshift(newTask);openTasks[newTask.id]=true;render();showToast('「'+tmpl.name+'」をコピーしました');}).catch(function(){});
}
function askDeleteTemplate(tmplId){var t=templates.find(function(t){return t.id===tmplId;});if(!t)return;document.getElementById('confirmTitle').textContent='テンプレートを削除しますか？';document.getElementById('confirmMsg').textContent='「'+t.name+'」を削除します。';pendingConfirmFn=function(){apiSend('deleteTemplate',{id:tmplId}).then(function(){templates=templates.filter(function(t){return t.id!==tmplId;});renderTemplateList();showToast('テンプレートを削除しました');}).catch(function(){});};document.getElementById('confirmOverlay').classList.add('show');}
function openSaveTmplModal(taskId){var task=tasks.find(function(t){return t.id===taskId;});document.getElementById('tmplNameInput').value=task?task.name:'';document.getElementById('tmplDescInput').value='';tmplDraftMembers=task?task.members.map(function(m){return {name:m.name};}):[];renderTmplMemberList();document.getElementById('tmplMemberName').value='';openModal('saveTmplModal');}
function renderTmplMemberList(){document.getElementById('tmplMemberList').innerHTML=tmplDraftMembers.map(function(m,i){return '<div class="tmpl-member-row"><span class="m-name">'+esc(m.name)+'</span><button class="m-remove" onclick="removeTmplMember('+i+')">&#10005;</button></div>';}).join('');}
function addTmplMember(){var n=document.getElementById('tmplMemberName').value.trim();if(!n)return;tmplDraftMembers.push({name:n});document.getElementById('tmplMemberName').value='';renderTmplMemberList();}
function removeTmplMember(i){tmplDraftMembers.splice(i,1);renderTmplMemberList();}
function saveTemplate(){
  var name=document.getElementById('tmplNameInput').value.trim();if(!name){alert('テンプレート名を入力してください');return;}
  var btn=document.getElementById('tmplSaveBtn');btn.disabled=true;
  var data={name:name,desc:document.getElementById('tmplDescInput').value.trim(),icon:'&#128203;',members:tmplDraftMembers.slice(),defaultDue:''};
  apiSend('saveTemplate',data).then(function(res){templates.push({id:res.id,name:data.name,desc:data.desc,icon:data.icon,members:data.members,defaultDue:''});closeModal('saveTmplModal');var p=document.getElementById('templatePanel');if(!p.classList.contains('show'))p.classList.add('show');renderTemplateList();showToast('テンプレート「'+name+'」を保存しました');}).catch(function(){}).finally(function(){btn.disabled=false;});
}
function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function closeConfirm(){pendingConfirmFn=null;document.getElementById('confirmOverlay').classList.remove('show');}
function runConfirmAction(){if(pendingConfirmFn)pendingConfirmFn();pendingConfirmFn=null;document.getElementById('confirmOverlay').classList.remove('show');}
var toastTimer;
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.classList.remove('show');},2200);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.querySelectorAll('.modal-overlay,.confirm-overlay').forEach(function(el){el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('show');});});
boot();
</script>
</body>
</html>
